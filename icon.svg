<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="KPC Bestelluebersicht">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a5e4c"/>
      <stop offset="100%" stop-color="#3d2d22"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e8"/>
      <stop offset="100%" stop-color="#f0e2c8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#a87838"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#1e8a4a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App-Hintergrund mit iOS-typischen abgerundeten Ecken -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Klemmbrett-Papier -->
  <g filter="url(#shadow)">
    <rect x="96" y="138" width="320" height="332" rx="22" ry="22" fill="url(#paper)"/>
  </g>

  <!-- Klemme/Halter oben -->
  <rect x="186" y="92" width="140" height="78" rx="14" ry="14" fill="url(#gold)" stroke="#5c3e1e" stroke-width="4"/>
  <rect x="222" y="68" width="68" height="38" rx="8" ry="8" fill="#6b5040" stroke="#3d2d22" stroke-width="3"/>
  <circle cx="256" cy="131" r="9" fill="#5c3e1e"/>

  <!-- Drei Textzeilen-Andeutungen (wie Bestellpositionen) -->
  <rect x="130" y="200" width="180" height="14" rx="4" fill="#6b5040" opacity="0.32"/>
  <rect x="130" y="232" width="240" height="10" rx="3" fill="#6b5040" opacity="0.18"/>
  <rect x="130" y="265" width="200" height="14" rx="4" fill="#6b5040" opacity="0.32"/>
  <rect x="130" y="297" width="160" height="10" rx="3" fill="#6b5040" opacity="0.18"/>

  <!-- Grosser Haken-Kreis als Status-/Bestaetigt-Symbol -->
  <circle cx="256" cy="390" r="64" fill="url(#check)"/>
  <path d="M 224 392 L 248 416 L 292 364" stroke="#fff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
